<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validation âge</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem;
      --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-border: #d4d1ca;
      --color-text: #28251d; --color-text-muted: #6f6b63; --color-primary: #01696f; --color-primary-hover: #0c4e54;
      --color-success: #437a22; --color-error: #a12c7b; --shadow-md: 0 8px 24px rgba(40,37,29,.08);
      --font-body: 'Satoshi', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-border: #393836;
      --color-text: #cdccca; --color-text-muted: #9a9894; --color-primary: #4f98a3; --color-primary-hover: #227f8b;
      --color-success: #6daa45; --color-error: #d163a7; --shadow-md: 0 12px 32px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text);
      background: radial-gradient(circle at top, rgba(1,105,111,.08), transparent 35%), var(--color-bg);
      display: grid; place-items: center; padding: var(--space-6);
    }
    .app {
      width: min(100%, 560px); background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-md); overflow: hidden;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center; padding: var(--space-4) var(--space-4) 0;
    }
    .toggle {
      min-width: 44px; min-height: 44px; border-radius: 999px; border: 1px solid var(--color-border); background: var(--color-surface-2);
      color: var(--color-text); cursor: pointer;
    }
    .content { padding: var(--space-8); }
    h1 { margin: 0 0 var(--space-3); font-size: var(--text-xl); line-height: 1.1; }
    p { margin: 0 0 var(--space-6); color: var(--color-text-muted); }
    .grid { display: grid; gap: var(--space-4); }
    label { display: block; margin-bottom: var(--space-2); font-size: var(--text-sm); font-weight: 700; }
    input, select {
      width: 100%; min-height: 48px; border-radius: var(--radius-md); border: 1px solid var(--color-border);
      background: var(--color-surface-2); color: var(--color-text); padding: 0 var(--space-4);
    }
    .row { display: grid; gap: var(--space-4); grid-template-columns: 1fr 1fr; }
    .btn {
      min-height: 50px; border: 0; border-radius: var(--radius-lg); background: var(--color-primary); color: white;
      font-weight: 700; cursor: pointer;
    }
    .btn:hover { background: var(--color-primary-hover); }
    .result {
      margin-top: var(--space-6); padding: var(--space-4); border-radius: var(--radius-lg); background: var(--color-surface-2);
      border: 1px solid var(--color-border); display: none;
    }
    .status { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2); }
    .ok { color: var(--color-success); }
    .no { color: var(--color-error); }
    .meta { color: var(--color-text-muted); }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } .content { padding: var(--space-6); } }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div></div>
      <button class="toggle" type="button" aria-label="Changer le thème" id="themeToggle">◐</button>
    </div>
    <section class="content">
      <h1>Validation d’âge</h1>
      <p>Entre la date en 8 chiffres au format AAAAMMJJ, par exemple 20031213. L’outil te dit immédiatement si l’âge minimum est atteint.</p>
      <form class="grid" id="ageForm">
        <div>
          <label for="dob">Date de naissance</label>
          <input id="dob" type="text" inputmode="numeric" pattern="\d{8}" maxlength="8" placeholder="20031213" required />
        </div>
        <div class="row">
          <div>
            <label for="minAge">Âge minimum</label>
            <select id="minAge">
              <option value="18">18 ans</option>
              <option value="19">19 ans</option>
              <option value="21">21 ans</option>
              <option value="25">25 ans</option>
            </select>
          </div>
          <div>
            <label for="checkDate">Date de vérification</label>
            <input id="checkDate" type="text" inputmode="numeric" pattern="\d{8}" maxlength="8" placeholder="20260402" required />
          </div>
        </div>
        <button class="btn" type="submit">Vérifier</button>
      </form>
      <div class="result" id="result" aria-live="polite">
        <div class="status" id="status"></div>
        <div id="details"></div>
      </div>
    </section>
  </main>
  <script>
    const root = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    let theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', theme);
    themeToggle.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
    });

    const checkDateInput = document.getElementById('checkDate');
    const now = new Date();
    checkDateInput.value = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

    function parseYYYYMMDD(value) {
      const clean = value.replace(/\D/g, '');
      if (!/^\d{8}$/.test(clean)) return null;
      const year = Number(clean.slice(0, 4));
      const month = Number(clean.slice(4, 6));
      const day = Number(clean.slice(6, 8));
      const dt = new Date(year, month - 1, day);
      if (dt.getFullYear() !== year || dt.getMonth() !== month - 1 || dt.getDate() !== day) return null;
      return dt;
    }

    function formatYYYYMMDDInput(el) {
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '').slice(0, 8);
      });
    }

    formatYYYYMMDDInput(document.getElementById('dob'));
    formatYYYYMMDDInput(document.getElementById('checkDate'));

    function computeAgeParts(birthDate, referenceDate) {
      let years = referenceDate.getFullYear() - birthDate.getFullYear();
      let months = referenceDate.getMonth() - birthDate.getMonth();
      let days = referenceDate.getDate() - birthDate.getDate();

      if (days < 0) {
        const previousMonth = new Date(referenceDate.getFullYear(), referenceDate.getMonth(), 0);
        days += previousMonth.getDate();
        months -= 1;
      }
      if (months < 0) {
        months += 12;
        years -= 1;
      }
      return { years, months, days };
    }

    document.getElementById('ageForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const dob = document.getElementById('dob').value;
      const minAge = Number(document.getElementById('minAge').value);
      const checkDate = document.getElementById('checkDate').value;
      const result = document.getElementById('result');
      const status = document.getElementById('status');
      const details = document.getElementById('details');

      const birthDate = parseYYYYMMDD(dob);
      const referenceDate = parseYYYYMMDD(checkDate);

      if (!birthDate || !referenceDate) {
        result.style.display = 'block';
        status.className = 'status no';
        status.textContent = 'Format invalide';
        details.innerHTML = '<div class="meta">Entre la date en 8 chiffres au format AAAAMMJJ, par exemple 20031213.</div>';
        return;
      }

      if (birthDate > referenceDate) {
        result.style.display = 'block';
        status.className = 'status no';
        status.textContent = 'Date invalide';
        details.innerHTML = '<div class="meta">La date de naissance ne peut pas être après la date de vérification.</div>';
        return;
      }

      const age = computeAgeParts(birthDate, referenceDate);
      const eligible = age.years >= minAge;
      result.style.display = 'block';
      status.className = 'status ' + (eligible ? 'ok' : 'no');
      status.textContent = eligible ? 'Âge valide' : 'Âge insuffisant';
      details.innerHTML = `
        <div><strong>Âge calculé :</strong> ${age.years} an(s), ${age.months} mois, ${age.days} jour(s).</div>
        <div class="meta">Seuil requis : ${minAge} ans. Date vérifiée : ${referenceDate.toLocaleDateString('fr-CA')}.</div>
      `;
    });
  </script>
</body>
</html>
